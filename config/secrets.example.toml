# SÉRÉNO — modèle de secrets (copier vers config/secrets.toml et ne pas versionner)
#
# Streamlit utilise souvent un TOML « plat » dans .streamlit/secrets.toml :
#   gsheet_id, gcs_bucket_name, gcp_project_id, service_account_email,
#   service_account_json_path, OPENAI_API_KEY, GEMINI_API_KEY
# Ce fichier montre une variante structurée [google] / [gcp] — harmoniser dans le code.

# ---------------------------------------------------------------------------
# Google — Sheets (pilote) + chemin vers le JSON du compte de service
# ---------------------------------------------------------------------------
[google]
# ID du classeur « Serno » (barre d'adresse Google Sheets)
sheets_spreadsheet_id = "1Mm-amButSAePCcuKEjoWZXQh0HgWJoVLsIXNU7ybjOk"

# Chemin relatif au dépôt vers le fichier JSON du compte de service
# (fichier présent sur ta machine, jamais commité — voir .gitignore)
service_account_json_path = ".streamlit/google-service-account.json"

# Email du compte de service (référence ; la clé reste dans le JSON)
service_account_email = "jopai-sereno-streamlit-connect@sereno-492614.iam.gserviceaccount.com"

# ---------------------------------------------------------------------------
# GCP — projet, Vertex AI, stockage (même compte de service si rôles IAM OK)
# ---------------------------------------------------------------------------
[gcp]
project_id = "sereno-492614"
# Région Vertex (ex. europe-west1, europe-west9)
vertex_location = "europe-west1"
# Bucket pour fichiers audio / exports (admin objets côté IAM)
gcs_bucket_name = "jopai-sereno"

# ---------------------------------------------------------------------------
# Vertex AI — l’auth se fait en général via le JSON du compte de service (ADC)
# Pas de clé API séparée obligatoire si les rôles Vertex sont sur la SA.
# ---------------------------------------------------------------------------
[vertex]
# Laisser vide si vous utilisez uniquement la SA + GOOGLE_APPLICATION_CREDENTIALS
# ou le chemin google.service_account_json_path chargé par votre code.
api_key_optional = ""

# ---------------------------------------------------------------------------
# Gemini (API clé) — optionnel ; réservé si vous appelez l’API Gemini en direct.
# Le cahier des charges privilégie Vertex avec la même identité GCP quand c’est possible.
# ---------------------------------------------------------------------------
[gemini]
api_key = ""

# ---------------------------------------------------------------------------
# Paiement — pilote : simulation uniquement (aucun appel PSP réel)
# ---------------------------------------------------------------------------
[payment_pilot]
# fake = écrans identiques au futur flux réel, mais court-circuit côté code
mode = "fake"
# Texte affiché sur l’écran carte (exemple type carte de test, aucun débit)
fake_card_hint = "Ex. 4242 4242 4242 4242 — simulation, aucun débit"
fake_cvv_hint = "Tout 3 chiffres"
fake_expiry_hint = "Toute date future"

# ---------------------------------------------------------------------------
# Stripe — hors pilote fake ; à activer plus tard (test puis live)
# ---------------------------------------------------------------------------
[stripe]
publishable_key = ""
secret_key = ""
webhook_secret = ""

# ---------------------------------------------------------------------------
# Visio (Daily / Twilio) — à renseigner quand intégration active
# ---------------------------------------------------------------------------
[daily]
api_key = ""

[twilio]
account_sid = ""
auth_token = ""
