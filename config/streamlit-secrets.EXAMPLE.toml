# Exemple à copier vers .streamlit/secrets.toml (fichier réel = local / Streamlit Cloud, jamais commité).
# Coller ici le contenu du JSON « Compte de service » GCP sous [gcp_service_account].

gsheet_id = "VOTRE_ID_CLASSEUR"
# Si true : affiche un avertissement quand une écriture Sheets (**Sessions**, **Paiements**, …) échoue.
# debug_sheets = true
# (alias historique) debug_sessions_sheet = true
gcs_bucket_name = "jopai-sereno"
# Chemins d’exemple pour la page **Tests connexions** (synthèse Vertex sur médias déjà dans le bucket) :
# gcs_sample_video_object = "video/samplevideo1.mp4"
# gcs_sample_audio_object = "audio/sampleaudio1.mp3"
# Logo affiché en haut à droite si aucun fichier dans ./logo/ (chemin objet dans le bucket) :
# gcs_logo_blob_path = "Logos/JOPAI-LogoSereno.jpg"
# Optionnel si déjà dans [gcp_service_account] :
gcp_project_id = "sereno-492614"

# --- Liens publics (QR code accueil projet, export PDF) ---
# URL de base sans slash final (Streamlit Cloud).
# streamlit_app_url = "https://votre-app.streamlit.app"
# Par défaut le QR pointe vers la racine : ?client_urgence=1 (géré dans Home.py — fiable avec dossier pages/).
# URL complète du parcours client si besoin (prime sur tout le reste) :
# sereno_client_entry_url = "https://votre-app.streamlit.app/?client_urgence=1"
# Ancien mode « sous-chemin » seul (déconseillé sans test ; peut afficher « Page not found » au 1er chargement) :
# sereno_client_entry_use_path = true
# sereno_client_entry_path = "/Proto_Client_accueil"

vertex_location = "europe-west1"
# ID versionné (les noms courts type gemini-1.5-flash peuvent renvoyer 404 selon la région) :
vertex_model = "gemini-2.0-flash-001"
# Alternatives : gemini-1.5-flash-002 ; ou changer vertex_location (ex. europe-west4).

OPENAI_API_KEY = ""
GEMINI_API_KEY = ""

# Visio pilote (optionnel) — lien « salle » fourni par Daily ou Twilio (création de salle côté serveur en prod).
# daily_room_url = "https://exemple.daily.co/..."
# twilio_video_room_url = "https://..."

# --- Notification artisan (priorités configurables) ---
# Ordre par défaut : SMS → appel → push. Exemple :
# notification_priority = ["sms", "call", "push"]
#
# Twilio (SMS + appels « réveil »). Tous les numéros au format E.164 (indicatif pays inclus, sans 00).
# TWILIO_FROM_NUMBER = numéro **attribué par Twilio** pour envoyer (ex. "+33612345678", "+16066991620" si
# Twilio vous a fourni un +1 US — c’est valide tant que c’est le numéro « From » actif du compte).
# Soit à la racine du TOML (recommandé) :
# TWILIO_ACCOUNT_SID = "ACxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
# TWILIO_AUTH_TOKEN = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
# TWILIO_FROM_NUMBER = "+16066991620"
# Soit dans une table (mêmes valeurs, clés courtes acceptées) :
# [twilio]
# account_sid = "ACxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
# auth_token = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
# from_number = "+16066991620"
#
# Dans **Experts** / **Utilisateurs_Acces** : téléphone **+33…** ou **06…** ; éviter « 336… » puis une logique
# qui rajoute encore **33** (erreur Twilio 21211 : +33336…). Compte **Twilio d’essai** : numéros destinataires
# souvent **à vérifier** dans la console (erreur 21219 sur les appels / certains SMS).
#
# Erreur **30044** (logs Twilio « Failed ») : (1) permissions **géographiques** SMS — expéditeur **+1** vers **+33** :
# activer la **France** (Messaging → Geo permissions) ; ou numéro Twilio **+33** en expéditeur. (2) compte **Trial** :
# SMS **trop long** (multi-segments) refusé — le code pilote envoie un texte **court** ; sinon compte **actif**.
# https://www.twilio.com/docs/errors/30044

# --- Enregistrement visio (Daily) ---
# Si DAILY_API_KEY est fourni et que la salle est Daily, le pilote peut déclencher start/stop recording via l’API Daily.
# DAILY_API_KEY = "xxxx"

# Option B (sans bloc ci-dessous) : fichier JSON uniquement
# service_account_json_path = ".streamlit/google-service-account.json"

# Ne pas placer TWILIO_* ni DAILY_API_KEY **sous** [gcp_service_account] : en TOML tout ce qui suit
# cette section sans nouveau [titre] reste **dans** la table SA — Streamlit ne verra pas les clés à la racine
# et Twilio restera « manquant ». Mettre Twilio à la racine ou dans `[twilio]` (voir plus haut).

[gcp_service_account]
type = "service_account"
project_id = "sereno-492614"
private_key_id = "REMPLACER"
private_key = """-----BEGIN PRIVATE KEY-----
COLLER_LA_CLE_PRIVEE_ICI
-----END PRIVATE KEY-----
"""
client_email = "votre-sa@projet.iam.gserviceaccount.com"
client_id = "REMPLACER"
auth_uri = "https://accounts.google.com/o/oauth2/auth"
token_uri = "https://oauth2.googleapis.com/token"
auth_provider_x509_cert_url = "https://www.googleapis.com/oauth2/v1/certs"
client_x509_cert_url = "https://www.googleapis.com/robot/v1/metadata/x509/votre-sa%40projet.iam.gserviceaccount.com"
universe_domain = "googleapis.com"
