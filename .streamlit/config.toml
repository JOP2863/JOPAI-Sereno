[server]
# Indispensable pour l'affichage des images et audios du dossier /static/
enableStaticServing = true

[client]
# SÉRÉNO : barre latérale (sections **Projet** / **Prototype** via `st.navigation` dans Home.py)
showSidebarNavigation = true

[theme]
# Thème Streamlit : bleu institutionnel, fond gris clair, texte foncé
primaryColor = "#003366"
backgroundColor = "#F4F7F9"
secondaryBackgroundColor = "#E2E8F0"
textColor = "#1a202c"
font = "sans serif"